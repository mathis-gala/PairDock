version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 2

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: docker-compose
    directory: /deploy
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
