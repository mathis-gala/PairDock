name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  static-quality:
    name: Static quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Architecture tests
        run: bun run test:architecture

  prisma-migrations:
    name: Prisma migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pairdock_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pairdock_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Apply database migrations
        run: bun run db:migrate

      - name: Check migration status
        run: bun run db:status

  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pairdock_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pairdock_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Apply database migrations
        run: bun run db:migrate

      - name: API unit, integration, and e2e tests
        timeout-minutes: 8
        run: bun run --filter @pairdock/api test

  local-agent-tests:
    name: Local agent tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Local agent integration tests
        timeout-minutes: 8
        run: bun run --filter @pairdock/local-agent test

  web-tests:
    name: Web tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Web unit tests
        run: bun run --filter @pairdock/web test:unit

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Build
        run: bun run build
