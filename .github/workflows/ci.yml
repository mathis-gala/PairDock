name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  static-quality:
    name: Static quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Architecture tests
        run: bun run test:architecture

  prisma-migrations:
    name: Prisma migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pairdock_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pairdock_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Apply database migrations
        run: bun run db:migrate

      - name: Check migration status
        run: bun run db:status

  api-unit-tests:
    name: API unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_ci
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: API unit tests
        run: bun run --filter @pairdock/api test:unit

  api-integration-tests:
    name: API integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pairdock_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pairdock_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_ci
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Apply database migrations
        run: bun run db:migrate:test

      - name: API integration tests
        timeout-minutes: 8
        run: bun run --filter @pairdock/api test:integration

  api-e2e-tests:
    name: API e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pairdock_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pairdock_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_ci
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Apply database migrations
        run: bun run db:migrate:test

      - name: API e2e tests
        timeout-minutes: 8
        run: bun run --filter @pairdock/api test:e2e

  local-agent-tests:
    name: Local agent tests (${{ matrix.test_file }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        test_file:
          - tests/packages/local-agent/integration/agent-client.integration.test.ts
          - tests/packages/local-agent/integration/agent-config.integration.test.ts
          - tests/packages/local-agent/integration/agent-harness.integration.test.ts
          - tests/packages/local-agent/integration/agent-prompt-command.integration.test.ts
          - tests/packages/local-agent/integration/checks-runner.integration.test.ts
          - tests/packages/local-agent/integration/command-handling.integration.test.ts
          - tests/packages/local-agent/integration/example-project.integration.test.ts
          - tests/packages/local-agent/integration/log-redactor.integration.test.ts
          - tests/packages/local-agent/integration/preview-adapters.integration.test.ts
          - tests/packages/local-agent/integration/readiness-runner.integration.test.ts
          - tests/packages/local-agent/integration/session-runner.integration.test.ts
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Local agent integration test file
        timeout-minutes: 4
        run: node --import tsx --test --test-concurrency=1 ${{ matrix.test_file }}

  web-tests:
    name: Web tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Web unit tests
        run: bun run --filter @pairdock/web test:unit

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pairdock_ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Build
        run: bun run build
